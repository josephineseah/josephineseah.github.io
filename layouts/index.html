{{- define "main" }}
<div class="post-content">
  {{ .Content }}
</div>

<div class="news-section">
  <h2>News & Updates</h2>
  <ul class="news-list">
    {{ range first 5 site.Data.news }}
    <li><span class="news-date">{{ .date }}</span> {{ .text | markdownify }}</li>
    {{ end }}
  </ul>
  <a href="/news/">See all news →</a>
</div>
{{- end }}
